<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>カテゴリ | プログラミング</title>
  <link rel="icon" href="img/favicon.png" type="image/png">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white text-slate-800">

  <nav class="fixed top-0 left-0 z-50 w-full border-b border-slate-300 bg-white">
    <div class="mx-auto flex max-w-5xl justify-end px-6 py-4">
      <ul class="flex gap-7 text-sm font-semibold text-slate-900">
        <li><a href="index.html" class="hover:text-blue-600">ホーム</a></li>
        <li><a href="about.html" class="hover:text-blue-600">授業情報</a></li>
        <li><a href="category.html" class="hover:text-blue-600">カテゴリ一覧</a></li>
      </ul>
    </div>
  </nav>

  <main class="mx-auto max-w-5xl px-5 pb-14 pt-28">

    <section class="mb-8">
      <h1 class="mb-2 text-3xl font-bold text-slate-900">カテゴリ一覧</h1>
    </section>

    <section class="overflow-x-auto">
      <table class="min-w-full border-collapse bg-white">
        <thead class="bg-slate-100">
          <tr>
            <th class="border border-slate-300 px-4 py-3 text-center text-sm font-semibold"></th>
            <th class="border border-slate-300 px-4 py-3 text-left text-sm font-semibold">パート</th>
            <th class="border border-slate-300 px-4 py-3 text-center text-sm font-semibold">セクション数</th>
            <th class="border border-slate-300 px-4 py-3 text-center text-sm font-semibold">配点</th>
            <th class="border border-slate-300 px-4 py-3 text-center text-sm font-semibold">実施回</th>
            <th class="border border-slate-300 px-4 py-3 text-center text-sm font-semibold">フォルダ</th>
          </tr>
        </thead>

        <tbody id="table-body"></tbody>
      </table>
    </section>

  </main>

  <footer class="mt-12 bg-slate-900 px-5 py-6 text-center text-sm text-slate-300">
    <p>© 2026 Masanari Ichikawa</p>
  </footer>

  <script>
    function createRow(item) {
      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td class="border border-slate-300 px-4 py-2 text-center">
          <img src="${item.icon}" class="mx-auto h-10 w-10 object-contain" />
        </td>

        <td class="border border-slate-300 px-4 py-3 text-sm font-medium text-slate-900">
          ${item.title}
        </td>

        <td class="border border-slate-300 px-4 py-3 text-center text-sm">
          ${item.sections}
        </td>

        <td class="border border-slate-300 px-4 py-3 text-center text-sm">
          ${item.points}
        </td>

        <td class="border border-slate-300 px-4 py-3 text-center text-sm">
          ${item.class_day}
        </td>

        <td class="border border-slate-300 px-4 py-3 text-center">
          <a
            href="${item.link}"
            target="_blank"
            class="inline-block px-3 py-1.5 text-sm font-semibold text-white bg-${item.color}"
          >
            開く
          </a>
        </td>
      `;
      return tr;
    }

    const data = [
      { id: "A", color: "red-500", icon: "img/a.png", title: "図形描画と関数", sections: "6", points: "5", class_day: "#1", link: "" },
      { id: "B", color: "cyan-500", icon: "img/b.png", title: "テキスト入出力と変数", sections: "8", points: "5", class_day: "#2", link: "" },
      { id: "C", color: "yellow-500", icon: "img/c.png", title: "算術演算", sections: "6", points: "5", class_day: "#3", link: "" },
      { id: "D", color: "green-500", icon: "img/d.png", title: "条件分岐", sections: "9", points: "5", class_day: "#4", link: "" },
      { id: "E", color: "pink-500", icon: "img/e.png", title: "繰り返し for ループ", sections: "7", points: "5", class_day: "#5, 6", link: "" },
      { id: "F", color: "violet-500", icon: "img/f.png", title: "繰り返し while ループ", sections: "7", points: "5", class_day: "#7", link: "" },
      { id: "G", color: "orange-500", icon: "img/g.png", title: "配列", sections: "10", points: "5", class_day: "#8, 9", link: "" },
      { id: "H", color: "lime-500", icon: "img/h.png", title: "外部データのよみかき", sections: "14", points: "5", class_day: "#10 ~ 12", link: "" },
      { id: "Q", color: "blue-500", icon: "img/q.png", title: "期末課題", sections: "10", points: "60", class_day: "#13 ~ 15", link: "" },
      { id: "Z", color: "neutral-500", icon: "img/z.png", title: "ガイダンス", sections: "6", points: "-", class_day: "#1", link: "" }
    ];

    const tableBody = document.getElementById("table-body");
    data.forEach(item => tableBody.appendChild(createRow(item)));
  </script>

</body>

</html>
