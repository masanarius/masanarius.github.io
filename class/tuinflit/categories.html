<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>カテゴリ一覧 | 情報リテラシー I & II</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-slate-800">

  <nav class="fixed top-0 left-0 z-50 w-full border-b border-slate-200 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-7xl justify-end px-6 py-4">
      <ul class="flex gap-7 text-sm font-semibold text-slate-900">
        <li><a href="index.html" class="hover:text-blue-600">ホーム</a></li>
        <li><a href="index.html" class="hover:text-blue-600">授業情報</a></li>
        <li><a href="categories.html" class="hover:text-blue-600">カテゴリ一覧</a></li>
      </ul>
    </div>
  </nav>

  <main class="mx-auto max-w-7xl px-5 pb-14 pt-28">
    <section class="mb-8">
      <h1 class="mb-2 text-3xl font-bold text-slate-900">カテゴリ一覧</h1>
      <p class="text-sm leading-7 text-slate-600">
        情報リテラシー I &amp; II の授業カテゴリ一覧です．各カテゴリの概要，セクション数，章末課題，配点，授業日，授業資料へのリンクを確認できます．
      </p>
    </section>

    <section id="card-grid" class="grid grid-cols-1 gap-6 md:grid-cols-2 xl:grid-cols-4"></section>
  </main>

  <footer class="mt-12 bg-slate-900 px-5 py-6 text-center text-sm text-slate-300">
    <p>© 2026 情報リテラシー I &amp; II</p>
  </footer>

  <script>
    function parseCSV(text) {
      const lines = text.trim().split("\n");
      const headers = lines[0].split(",");
      return lines.slice(1).map(line => {
        const values = line.split(",");
        const row = {};
        headers.forEach((h, i) => row[h] = values[i]);
        return row;
      });
    }

    function createCard(item) {
      const article = document.createElement("article");
      article.className =
        `flex flex-col gap-4 rounded-2xl border border-slate-200 border-t-4 bg-white p-5 shadow-sm border-t-${item.color}`;

      const buttonHover = item.color.replace(/(\d+)$/, m => String(Number(m) + 100 <= 900 ? Number(m) + 100 : m));

      article.innerHTML = `
        <div class="flex items-start gap-4">
          <img src="${item.icon}" alt="カテゴリ${item.id}アイコン" class="h-16 w-16 shrink-0 object-contain" />
          <div class="min-h-[4rem] flex items-center">
            <h2 class="text-lg font-bold leading-snug text-slate-900">${item.title}</h2>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-2">
          <div class="rounded-lg border border-slate-200 bg-white px-3 py-2">
            <div class="text-[11px] leading-tight text-slate-500">セクション数</div>
            <div class="text-sm font-semibold text-slate-900">${item.sections}</div>
          </div>
          <div class="rounded-lg border border-slate-200 bg-white px-3 py-2">
            <div class="text-[11px] leading-tight text-slate-500">章末課題</div>
            <div class="text-sm font-semibold text-slate-900">${item.assignment}</div>
          </div>
          <div class="rounded-lg border border-slate-200 bg-white px-3 py-2">
            <div class="text-[11px] leading-tight text-slate-500">配点</div>
            <div class="text-sm font-semibold text-slate-900">${item.points}</div>
          </div>
          <div class="rounded-lg border border-slate-200 bg-white px-3 py-2">
            <div class="text-[11px] leading-tight text-slate-500">授業日</div>
            <div class="text-sm font-semibold text-slate-900">${item.class_day}</div>
          </div>
        </div>

        <p class="text-sm leading-7 text-slate-600">${item.summary}</p>

        <div class="mt-auto">
        <a
          href="${item.link}"
          target="_blank"
          rel="noopener noreferrer"
          class="inline-block rounded-lg px-4 py-2.5 text-sm font-semibold text-white bg-${item.color} hover:bg-${buttonHover}"
        >
          授業資料を見る
        </a>
      </div>
      `;
      return article;
    }

    fetch("categories.csv")
      .then(response => response.text())
      .then(csvText => {
        const data = parseCSV(csvText);
        const grid = document.getElementById("card-grid");
        data.forEach(item => grid.appendChild(createCard(item)));
      })
      .catch(error => {
        console.error("CSVの読み込みに失敗しました:", error);
      });
  </script>
</body>
</html>
