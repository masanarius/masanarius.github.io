<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Selection Task v13</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gray-100 p-3">
    <div class="mx-auto max-w-6xl rounded-2xl bg-white p-4 shadow">

        <!-- Session / Player -->
        <div class="mb-3 flex items-center gap-4 overflow-x-auto">

            <!-- Session ID -->
            <div class="flex items-center gap-2 whitespace-nowrap">
                <label class="font-semibold text-gray-700">
                    Session ID
                </label>

                <select id="sessionSelect" onchange="lockSessionID()"
                    class="rounded-lg border border-gray-300 px-3 py-2">
                </select>
            </div>

            <!-- Player ID -->
            <div class="flex items-center gap-2 whitespace-nowrap">
                <label class="font-semibold text-gray-700">
                    Player ID
                </label>

                <select id="playerSelect" onchange="lockPlayerID()" class="rounded-lg border border-gray-300 px-3 py-2">
                </select>
            </div>

        </div>

        <!-- Trial / Score -->
        <div class="mb-5 flex items-center justify-end gap-2">

            <div id="trialCounter"
                class="whitespace-nowrap rounded-xl bg-gray-200 px-4 py-2 text-lg font-bold text-gray-800">
                Trial 0/60
            </div>

            <div id="totalScoreArea"
                class="whitespace-nowrap rounded-xl bg-gray-800 px-4 py-2 text-lg font-bold text-white">
                Score 0
            </div>





        </div>

        <!-- Tabs -->
        <div class="mb-4 flex border-b">
            <button id="mainTab" class="border-b-2 border-blue-600 px-4 py-2 font-semibold text-blue-600"
                onclick="showTab('main')">
                Game
            </button>

            <button id="historyTab" class="border-b-2 border-transparent px-4 py-2 font-semibold text-gray-500"
                onclick="showTab('history')">
                History
            </button>
            <button id="settingTab" class="border-b-2 border-transparent px-4 py-2 font-semibold text-gray-500"
                onclick="showTab('setting')">
                Setting
            </button>
        </div>

        <!-- Main -->
        <div id="mainContent">
            <h1 class="mb-4 text-xl font-bold">Game</h1>

            <div class="mb-4 flex justify-end">
                <div id="cooldownArea"
                    class="whitespace-nowrap rounded-xl bg-green-600 px-4 py-2 text-lg font-bold text-white">
                    【選択フェーズ】図形を1枚選択せよ
                </div>
            </div>


            <div class="grid grid-cols-3 gap-2">

                <!-- LEFT -->
                <button
                    class="relative flex aspect-[0.8/1] items-center justify-center overflow-hidden rounded-xl bg-black p-1 shadow"
                    onclick="selectImage(0)">
                    <img id="img1" class="shape-image object-contain" src="" alt="image1" />

                    <div id="score1" class="score-popup hidden absolute inset-0 z-10 flex items-center justify-center">
                        <div class="rounded-2xl bg-black/80 px-6 py-3 text-6xl font-extrabold text-white shadow-2xl">
                        </div>
                    </div>
                </button>

                <!-- CENTER -->
                <button
                    class="relative flex aspect-[0.8/1] items-center justify-center overflow-hidden rounded-xl bg-black p-1 shadow"
                    onclick="selectImage(1)">
                    <img id="img2" class="shape-image object-contain" src="" alt="image2" />

                    <div id="score2" class="score-popup hidden absolute inset-0 z-10 flex items-center justify-center">
                        <div class="rounded-2xl bg-black/80 px-6 py-3 text-6xl font-extrabold text-white shadow-2xl">
                        </div>
                    </div>
                </button>

                <!-- RIGHT -->
                <button
                    class="relative flex aspect-[0.8/1] items-center justify-center overflow-hidden rounded-xl bg-black p-1 shadow"
                    onclick="selectImage(2)">
                    <img id="img3" class="shape-image object-contain" src="" alt="image3" />

                    <div id="score3" class="score-popup hidden absolute inset-0 z-10 flex items-center justify-center">
                        <div class="rounded-2xl bg-black/80 px-6 py-3 text-6xl font-extrabold text-white shadow-2xl">
                        </div>
                    </div>
                </button>

            </div>

            <!-- Refresh -->
            <div class="mt-3 flex justify-end">
                <button onclick="refreshImages()" id="refreshButton"
                    class="rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-blue-700 active:scale-95">
                    3枚を再抽選する
                </button>
            </div>
        </div>

        <!-- History -->
        <!-- History -->
        <div id="historyContent" class="hidden">

            <div class="overflow-hidden rounded-xl border border-gray-300">

                <!-- Header -->
                <div class="grid grid-cols-[80px_1fr] bg-gray-200 px-4 py-3 text-sm font-bold text-gray-700">
                    <div>Trial</div>
                    <div>Selected Image</div>
                </div>

                <!-- Rows -->
                <div id="historyList" class="max-h-[60vh] overflow-y-auto bg-white"></div>

            </div>

        </div>

        <!-- Setting -->
        <div id="settingContent" class="hidden">

            <button onclick="resetGame()" class="rounded-lg bg-red-600 px-4 py-2 text-sm font-semibold text-white">
                RESET
            </button>

        </div>

    </div>

    <script src="js/config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/score.js"></script>
    <script src="js/images.js"></script>
    <script src="js/forms.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/game.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/main.js"></script>

</body>

</html>
